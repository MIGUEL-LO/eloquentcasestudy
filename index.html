// ─── Helpers ─────────────────────────────────────────────────
function formatCurrency(n) {
  return '$' + Number(n).toLocaleString('en-US');
}

function formatDateDisplay(iso) {
  // DD/MM/YYYY
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

function formatDateTable(iso) {
  // "Jan 15, 2023" style
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function daysBetween(iso1, iso2) {
  const d1 = new Date(iso1 + 'T00:00:00');
  const d2 = new Date(iso2 + 'T00:00:00');
  return Math.floor((d2 - d1) / (1000*60*60*24));
}

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function isoFromInput(val) {
  // browser date input gives YYYY-MM-DD
  return val;
}

function inputDateFromISO(iso) {
  return iso; // already YYYY-MM-DD
}

// ─── Sidebar ─────────────────────────────────────────────────
function Sidebar({ clients }) {
  const today = todayISO();
  const totalClients = clients.length;
  const totalSpent = clients.reduce((s,c) => s + c.totalSpent, 0);
  const avgLTV = Math.floor(totalSpent / totalClients);
  
  const enterpriseSpent = clients.filter(c => c.segment === 'Enterprise').reduce((s,c) => s + c.totalSpent, 0);
  const enterpriseRevPct = ((enterpriseSpent / totalSpent) * 100).toFixed(1);
  
  const churnRisk = clients.filter(c => {
    if (c.status !== 'Active') return false;
    if (c.segment !== 'Enterprise' && c.segment !== 'SME') return false;
    return daysBetween(c.lastActive, today) > 60;
  }).length;

  const cardStyle = {
    background: 'var(--white)',
    borderRadius: '12px',
    padding: '16px',
    marginBottom: '12px',
    border: '1px solid var(--border-light)',
  };

      minHeight: '100vh',

      display: 'flex',
      flexDirection: 'column',
      borderRight: '1px solid var(--border-light)',
      background: 'var(--bg)',

      top: 0,
      bottom: 0,
      zIndex: 10,

        Key Metrics

        <div style={{ fontSize:'28px', fontWeight:700, color:'var(--purple-accent)', marginTop:'2px' }}>$ {avgLTV.toLocaleString('en-US')}</div>
        <div style={{ fontSize:'11px', color:'var(--text-muted)', marginTop:'2px' }}>Average lifetime value per customer</div>
      </div>

      <div style={cardStyle}>
        <TrendIcon />
        <div style={{ fontSize:'12px', color:'var(--text-secondary)', marginTop:'10px', fontWeight:500 }}>Enterprise Revenue</div>
        <div style={{ fontSize:'28px', fontWeight:700, color:'var(--text-primary)', marginTop:'2px' }}>{enterpriseRevPct}%</div>
        <div style={{ fontSize:'11px', color:'var(--text-muted)', marginTop:'2px' }}>Share of total transaction volume</div>
      </div>

        <div style={{ fontSize:'11px', color:'var(--text-muted)', marginTop:'2px' }}>Enterprise/SME &gt; 60 days</div>
      </div>

    </div>
  );
}

        {/* Contact Details */}
        <div style={cardStyle}>
          <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'16px' }}>
            <ContactIcon />
            <span style={{ fontSize:'14px', fontWeight:600 }}>Contact Details</span>
          </div>
          <div style={{ fontSize:'12px', color:'var(--text-muted)', marginBottom:'4px' }}>Email Address</div>
          <div style={{ display:'flex', alignItems:'center', gap:'6px', fontSize:'14px', fontWeight:500 }}>
            <MailIcon /> {client.email}
          </div>
        </div>

        {/* Financial Overview */}
        <div style={{
          ...cardStyle,
          border: editingFinancial ? '1.5px solid var(--purple-light)' : '1px solid var(--border-light)',
        }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'16px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
              <FinancialIcon />
              <span style={{ fontSize:'14px', fontWeight:600 }}>Financial Overview</span>
            </div>
            {editingFinancial ? (
              <span
                onClick={handleCancel}
                style={{ fontSize:'13px', color:'var(--text-secondary)', cursor:'pointer', display:'flex', alignItems:'center', gap:'4px' }}
              >
                ✕ Cancel
              </span>
            ) : (
              <span
                onClick={() => setEditingFinancial(true)}
                style={{ fontSize:'13px', color:'var(--purple-accent)', cursor:'pointer', display:'flex', alignItems:'center', gap:'4px', fontWeight:500 }}
              >
                <EditPenIcon /> Edit
              </span>
            )}
          </div>

          {editingFinancial ? (
            <div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px', marginBottom:'12px' }}>
                <div>
                  <div style={{ fontSize:'12px', color:'var(--text-muted)', marginBottom:'4px' }}>Lifetime Value</div>
                  <div style={{ display:'flex', alignItems:'center', border:'1px solid var(--border)', borderRadius:'8px', overflow:'hidden' }}>
                    <span style={{ padding:'8px 10px', color:'var(--text-muted)', fontSize:'14px', background:'#fafafa' }}>$</span>
                    <input
                      type="number"
                      value={ltv}
                      onChange={e => setLtv(e.target.value)}
                      style={{
                        flex:1, padding:'8px 10px', border:'none', outline:'none',
                        fontSize:'14px', fontWeight:600, color:'var(--purple-accent)',
                        background:'transparent',
                      }}
                    />
                  </div>
                </div>
                <div>
                  <div style={{ fontSize:'12px', color:'var(--text-muted)', marginBottom:'4px' }}>Total Transactions</div>
                  <input
                    type="number"
                    value={txns}
                    onChange={e => setTxns(e.target.value)}
                    style={{
                      width:'100%', padding:'8px 10px',
                      border:'1px solid var(--border)', borderRadius:'8px',
                      fontSize:'14px', fontWeight:600, outline:'none',
                      color:'var(--text-primary)',
                    }}
                  />
                </div>
              </div>
              <div>
                <div style={{ fontSize:'12px', color:'var(--text-muted)', marginBottom:'4px' }}>Last Activity</div>
                <input
                  type="date"
                  value={inputDateFromISO(lastAct)}
                  onChange={e => setLastAct(isoFromInput(e.target.value))}
                  style={{
                    width:'100%', padding:'8px 10px',
                    border:'1px solid var(--border)', borderRadius:'8px',
                    fontSize:'14px', fontWeight:500, outline:'none',
                    color:'var(--text-primary)',
                  }}
                />
              </div>
            </div>
          ) : (
            <div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px', marginBottom:'16px' }}>
                <div>
                  <div style={{ fontSize:'12px', color:'var(--text-muted)', marginBottom:'2px' }}>Lifetime Value</div>
                  <div style={{ fontSize:'24px', fontWeight:700, color:'var(--purple-accent)' }}>{formatCurrency(client.totalSpent)}</div>
                </div>
                <div>
                  <div style={{ fontSize:'12px', color:'var(--text-muted)', marginBottom:'2px' }}>Total Transactions</div>
                  <div style={{ fontSize:'24px', fontWeight:700 }}>{client.transactions}</div>
                </div>
              </div>
              <div style={{ borderTop:'1px solid var(--border-light)', paddingTop:'12px' }}>
                <div style={{ fontSize:'12px', color:'var(--text-muted)', marginBottom:'4px' }}>Last Activity</div>
                <div style={{ display:'flex', alignItems:'center', gap:'6px', fontSize:'14px', fontWeight:500 }}>
                  <CalendarIcon /> {formatDateDisplay(client.lastActive)}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


// ─── App ─────────────────────────────────────────────────────
function App() {
  const [clients, setClients] = useState(initialClients);
  const [selectedId, setSelectedId] = useState(null);

  const handleSaveClient = useCallback((updated) => {
    setClients(prev => prev.map(c => c.id === updated.id ? updated : c));
  }, []);

  const selectedClient = selectedId ? clients.find(c => c.id === selectedId) : null;

  return (
    <div>
      <Sidebar clients={clients} />
      {selectedClient ? (
        <DetailPage
          key={selectedClient.id}
          client={selectedClient}
          onBack={() => setSelectedId(null)}
          onSave={handleSaveClient}
        />
      ) : (
        <Dashboard clients={clients} onSelectClient={setSelectedId} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
